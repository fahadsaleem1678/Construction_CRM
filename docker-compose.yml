services:
  postgres:
    image: postgres:16-alpine
    container_name: construction-crm-postgres
    environment:
      POSTGRES_DB: construction_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - construction-crm-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d construction_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  construction-crm-postgres:
